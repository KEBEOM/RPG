<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>무한 역사 문제 풀이 RPG</title>
<script src="quiz_data.js"></script>
<script src="study_data.js"></script>
<style>
    :root {
        --safe-left: env(safe-area-inset-left);
        --safe-right: env(safe-area-inset-right);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-top: env(safe-area-inset-top);
    }

    html, body {
        width: 100%; height: 100%; margin: 0; padding: 0; 
        background-color: #000; display: flex; justify-content: center; align-items: center;
        font-family: 'NeoDunggeunmo', 'Malgun Gothic', sans-serif;
        overflow: hidden; 
    }

    #app-wrapper {
        width: 100%; height: 100%; max-width: 100%;
        position: relative; background-color: #1a1a1a; color: #fff;
        overflow: hidden; display: flex; flex-direction: column;
        padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        box-sizing: border-box;
    }

    @media (min-width: 451px) {
        #app-wrapper { max-width: 450px; height: 95vh; border-radius: 20px; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
    }

    .screen-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
    
    .game-title { font-size: 2.8rem; color: #ffd700; text-align: center; margin-bottom: 10px; text-shadow: 2px 2px 0px #d32f2f; flex: none; }
    #data-status { color: #a5d6a7; font-size: 1rem; margin-bottom: 15px; text-align: center; }
    #high-score-display { font-size: 1.2rem; color: #4dd0e1; margin-bottom: 20px; font-weight: bold; text-shadow: 1px 1px 0px #333; background-color: #2c3e50; padding: 10px 20px; border-radius: 8px; border: 2px solid #34495e; }

    .title-btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .title-btn { background-color: #e65100; color: white; border: none; padding: 15px; font-size: 1.3rem; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-weight: bold; transition: transform 0.1s;}
    
    .title-btn.tutorial-btn { background-color: #e91e63; }
    .title-btn.study-btn { background-color: #0277bd; }
    .title-btn.load-btn { background-color: #00838f; }
    button:active { transform: scale(0.95); }
    .back-btn { background-color: #616161; color: white; border: none; padding: 12px; font-size: 1rem; border-radius: 6px; cursor: pointer; flex: none; width: 100%; margin-top: 10px;}

    .help-btn { position: absolute; top: 12px; right: 12px; background-color: #0277bd; border: 1.5px solid #fff; color: #fff; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 500; }

    #range-screen { display: none; z-index: 120; }
    .range-box { background-color: #2c3e50; padding: 25px; border-radius: 15px; border: 2px solid #f39c12; text-align: center; width: 100%; box-sizing: border-box; max-width: 400px;}
    .select-wrapper { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    select { padding: 10px; font-size: 1rem; border-radius: 5px; width: 65%; }

    #reward-screen { display: none; background-color: #1a1a1a; z-index: 180; padding: 20px; justify-content: center; align-items: center;}
    #reward-cards-container { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
    .reward-card { background-color: #2c3e50; border: 3px solid #f39c12; border-radius: 12px; display: flex; flex-direction: row; width: 100%; padding: 15px; align-items: center; text-align: left; box-shadow: 0 4px 8px rgba(0,0,0,0.4); box-sizing: border-box; cursor: pointer; transition: transform 0.2s;}
    .reward-icon { font-size: 2.5rem; margin-right: 15px; flex: none; }
    .reward-text-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .reward-title { color: #ffd700; font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
    .reward-desc { color: #ecf0f1; font-size: 0.9rem; line-height: 1.3; word-break: keep-all;}

    #study-screen { display: none; background-color: #1a1a1a; z-index: 150; }
    #study-content { flex: 1; width: 100%; max-width: 600px; overflow-y: auto; background-color: #212f3d; border-radius: 10px; padding: 15px; border: 2px solid #34495e; box-sizing: border-box;}
    .category-header { background-color: #e65100; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; cursor: pointer; display: flex; justify-content: space-between;}
    .category-content { display: none; padding-left: 10px; border-left: 3px solid #e65100; margin-bottom: 10px; margin-top: 10px; }
    .study-item { background-color: #34495e; border-radius: 8px; margin-bottom: 8px; overflow: hidden;}
    .study-keyword { padding: 12px; font-size: 1rem; color: #4dd0e1; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between;}
    .study-desc { display: none; padding: 12px; font-size: 0.9rem; color: #ecf0f1; background-color: #2c3e50; line-height: 1.4; }

    #game-container { display: none; flex-direction: column; height: 100%; width: 100%; position: relative;}
    
    #status-bar { display: flex; justify-content: space-between; flex-wrap: wrap; background-color: #333; padding: 8px 12px; font-size: 0.9rem; border-bottom: 2px solid #555; gap: 5px; flex: none; z-index: 10; }
    .stat-box { flex: 1 1 45%; min-width: 80px; }
    .stat-box span { color: #ffd700; font-weight: bold; }
    .hp-text { color: #ff6b6b; }

    #main-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
    #action-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; width: 100%; gap: 10px;}
    #left-panel, #right-panel { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }

    #monster-area { display: none; flex-direction: column; align-items: center; width: 100%; justify-content: center;}
    #monster-name { font-size: 1.3rem; margin-bottom: 5px; margin-top: 0;}
    #monster-image { width: 80px; height: 80px; background-color: #555; border: 3px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 5px; }
    
    #quiz-box { display: none; background-color: #2c3e50; padding: 15px; border-radius: 10px; border: 2px solid #f39c12; margin-bottom: 10px; width: 100%; font-size: 1rem; line-height: 1.4; word-break: keep-all; box-sizing: border-box; text-align: center; }

    button { color: white; border: none; font-size: 0.95rem; border-radius: 8px; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.3); box-sizing: border-box; padding: 10px; font-family: inherit;}

    .grid-ui { display: none; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; align-content: center; }
    .full-width { grid-column: 1 / -1; } 
    .option-btn { margin: 0 !important; font-size: 1rem; padding: 12px; background-color: #34495e; text-align: center; }

    @keyframes hintPulse {
        0% { box-shadow: 0 0 0px rgba(255, 215, 0, 0.5); border-color: #f39c12; }
        50% { box-shadow: 0 0 15px rgba(255, 215, 0, 1); border-color: #ffd700; background-color: #4a4a1a;}
        100% { box-shadow: 0 0 0px rgba(255, 215, 0, 0.5); border-color: #f39c12;}
    }
    .hint-btn {
        border: 2px solid #ffd700 !important;
        color: #ffd700 !important;
        font-weight: bold;
        animation: hintPulse 1.5s infinite;
    }

    .lobby-btn { background-color: #7b1fa2; font-size: 1rem; }
    .bag-btn { background-color: #8d6e63; }
    .system-btn { background-color: #455a64; }
    .quit-btn { background-color: #c62828; }
    
    .shop-btn { background-color: #00838f; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; padding: 10px 5px;}
    .shop-btn span { font-size:0.75rem; color:#b2ebf2; word-break: keep-all;}

    .quiz-btn { background-color: #d32f2f; font-size: 1.05rem; }
    .potion-btn { background-color: #fbc02d; color: #333; font-weight: bold;}
    
    #log-box { flex: none; height: 100px; background-color: #000; border-top: 2px solid #555; padding: 8px; overflow-y: auto; font-size: 0.85rem; line-height: 1.3; box-sizing: border-box; }
    #log-box p { margin: 3px 0; }

    #inventory-modal { display: none; position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%; background: rgba(30, 40, 50, 0.98); border: 3px solid #f39c12; z-index: 600; border-radius: 15px; padding: 15px; flex-direction: column; box-shadow: 0 10px 20px rgba(0,0,0,0.8); max-width: 500px; margin: 0 auto;}
    #inventory-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .inv-item { display: flex; justify-content: space-between; align-items: center; background: #34495e; padding: 10px; border-radius: 8px; }
    .inv-item-info { flex: 1; }
    .inv-item-title { font-size: 0.95rem; color: #ffd700; font-weight: bold; margin-bottom: 3px;}
    .inv-item-desc { font-size: 0.8rem; color: #bdc3c7; line-height: 1.2;}
    .use-btn { background-color: #e65100; padding: 8px 12px; flex: none; margin-left: 10px; }

    @keyframes fadeInPanel {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    #tutorial-overlay {
        display: none; position: absolute; z-index: 1000;
        background: rgba(30, 40, 50, 0.95);
        border: 3px solid #00e676; border-radius: 15px; padding: 20px; box-sizing: border-box;
        flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        animation: fadeInPanel 0.2s ease-out;
    }
    
    #tutorial-overlay.pos-bottom { 
        bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; top: auto;
    }
    
    #tutorial-overlay.pos-quiz { 
        top: 60px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; bottom: auto;
    } 

    #tutorial-text { font-size: 1.1rem; line-height: 1.5; color: #fff; margin-bottom: 15px; white-space: pre-line; word-break: keep-all; text-align: left; }
    .tut-btn-wrap { display: flex; justify-content: space-between; gap: 10px; }
    .tut-btn { padding: 10px 20px; font-size: 1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    .tut-exit { background-color: #616161; color: white; }
    .tut-next { background-color: #00e676; color: #000; flex: 1; }

    @media (max-height: 500px) and (orientation: landscape) {
        #app-wrapper { max-width: 100%; border-radius: 0; }
        #status-bar { padding: 4px 10px; font-size: 0.8rem; }
        #action-area { flex-direction: row; gap: 15px; padding: 10px; align-items: stretch;}
        #left-panel { width: 35%; justify-content: center; }
        #right-panel { width: 60%; justify-content: center; }
        #monster-area { margin-bottom: 0; }
        #monster-image { width: 70px; height: 70px; font-size: 2rem; }
        #quiz-box { margin-bottom: 8px; padding: 10px; font-size: 0.95rem; }
        .grid-ui { gap: 6px; }
        button { padding: 8px; font-size: 0.85rem; }
        .option-btn { padding: 8px; }
        #log-box { height: 60px; font-size: 0.8rem; padding: 5px 10px; }
        #reward-cards-container { flex-direction: row; justify-content: center; max-width: 100%; height: 100%; align-items: stretch; gap: 10px;}
        .reward-card { flex: 1; flex-direction: column; padding: 10px; text-align: center; }
        .reward-icon { margin-right: 0; margin-bottom: 5px; font-size: 2rem; }
        
        #tutorial-overlay { padding: 15px; }
        #tutorial-overlay.pos-bottom { bottom: 5px; width: 70%; }
        #tutorial-overlay.pos-quiz { 
            top: 50%; left: 10px; transform: translateY(-50%); width: 40%; max-width: none;
        } 
        #tutorial-text { font-size: 0.85rem; margin-bottom: 10px; line-height: 1.3; }
        .tut-btn { padding: 6px 10px; font-size: 0.85rem; }
        .tut-btn-wrap { gap: 5px; }
    }

    @media (min-width: 600px) and (max-width: 900px) and (min-height: 501px) {
        #app-wrapper { max-width: 600px; height: 90vh; border-radius: 20px; }
        .game-title { font-size: 3.5rem; }
        #monster-image { width: 120px; height: 120px; font-size: 3.5rem; }
        #monster-name { font-size: 1.6rem; }
        #quiz-box { font-size: 1.2rem; padding: 20px; }
        button { padding: 15px; font-size: 1.1rem; }
        .option-btn { padding: 15px; }
        .shop-btn span { font-size: 0.9rem; margin-top: 8px;}
        #log-box { height: 120px; font-size: 1rem; }
        #tutorial-overlay { max-width: 500px; padding: 25px; }
        #tutorial-text { font-size: 1.2rem; }
    }

    @media (min-width: 901px) and (min-height: 501px) {
        #app-wrapper { max-width: 950px; height: 85vh; min-height: 600px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .game-title { font-size: 3.5rem; margin-bottom: 15px; }
        .title-btn-group { flex-direction: row; max-width: 800px; gap: 20px; }
        .title-btn { flex: 1; padding: 15px; font-size: 1.3rem; }
        #status-bar { font-size: 1.05rem; padding: 10px 25px; }
        #action-area { flex-direction: row; align-items: stretch; padding: 15px 30px; gap: 30px; }
        #left-panel { width: 40%; border-right: 2px dashed #444; padding-right: 20px; justify-content: center; }
        #right-panel { width: 60%; padding-left: 10px; justify-content: center; display: flex; flex-direction: column; }
        #monster-image { width: 130px; height: 130px; font-size: 4.5rem; margin-bottom: 10px;}
        #monster-name { font-size: 1.8rem; margin-bottom: 0;}
        .hp-text { font-size: 1.2rem; margin-top: 5px;}
        #quiz-box { font-size: 1.1rem; padding: 15px; margin-bottom: 15px; flex: none; }
        .grid-ui { gap: 10px; }
        button { font-size: 1.05rem; padding: 12px; }
        .option-btn { font-size: 1.05rem; padding: 12px; margin-bottom: 0; } 
        .shop-btn span { font-size: 0.85rem; margin-top: 5px;}
        #log-box { height: 100px; font-size: 1rem; padding: 10px 30px; border-top: 2px solid #555;}
        #reward-cards-container { flex-direction: row; max-width: 90%; gap: 15px; height: auto;}
        .reward-card { flex: 1; flex-direction: column; text-align: center; padding: 25px 15px; }
        .reward-card:hover { transform: translateY(-5px); background-color: #34495e;}
        .reward-icon { margin-right: 0; margin-bottom: 10px; font-size: 3.5rem; }
        .reward-title { font-size: 1.3rem; margin-bottom: 5px;}
        .reward-desc { font-size: 0.95rem; }
        
        #tutorial-overlay { padding: 25px; }
        #tutorial-overlay.pos-bottom { bottom: 30px; width: 600px; }
        #tutorial-overlay.pos-quiz { 
            top: 50%; left: 30px; transform: translateY(-50%); width: 35%; max-width: 400px;
        }
        #tutorial-text { font-size: 1.2rem; }
    }
</style>
</head>
<body>

<div id="app-wrapper">
    <button id="global-help" class="help-btn" style="display:none;" onclick="showHelp()">?</button>

    <div id="title-screen" class="screen-panel">
        <h1 class="game-title">풀어라!<br>역사 타워!</h1>
        <div id="high-score-display">🏆 최고 도달 기록: <span id="high-score-ui">1</span>층</div>
        <div id="data-status">데이터를 불러오는 중...</div>
        <div class="title-btn-group">
            <button class="title-btn tutorial-btn" onclick="startTutorial()">🎓 튜토리얼 (초보자용)</button>
            <button class="title-btn study-btn" onclick="openStudyScreen()">📖 공부하기</button>
            <button class="title-btn" onclick="openRangeScreen()">✏️ 탑 오르기</button>
            <button class="title-btn load-btn" onclick="loadGameFromTitle()">💾 이어하기</button>
        </div>
    </div>

    <div id="range-screen" class="screen-panel">
        <div class="range-box">
            <h2>📜 출제 범위 선택</h2>
            <div class="select-wrapper"><span>시작:</span><select id="start-category"></select></div>
            <div class="select-wrapper"><span>끝:</span><select id="end-category"></select></div>
            <button class="title-btn start-game-btn" onclick="startCustomGame()">도전 시작!</button>
        </div>
        <button class="back-btn" style="max-width:400px;" onclick="closeRangeScreen()">⬅️ 메인 메뉴로</button>
    </div>

    <div id="reward-screen" class="screen-panel">
        <h2 class="game-title">😄 클리어 보상</h2>
        <div id="reward-cards-container"></div>
    </div>

    <div id="study-screen" class="screen-panel">
        <h2 class="game-title" style="font-size: 2rem; margin-bottom: 15px;">📖 역사 지식 노트</h2>
        <div id="study-content"></div>
        <button class="back-btn" style="max-width: 600px;" onclick="closeStudyScreen()">⬅️ 돌아가기</button>
    </div>

    <div id="game-container">
        <div id="status-bar">
            <div class="stat-box" style="flex: 1 1 100%;">층수: <span id="floor-ui">1F</span></div>
            <div class="stat-box hp-text">지식: <span id="hp-ui">100/100</span></div>
            <div class="stat-box">골드: <span id="gold-ui">0</span>G</div>
            <div class="stat-box" style="color:#ffb74d;">암기력: <span id="atk-ui">+0</span></div>
            <div class="stat-box" style="color:#81c784;">회피: <span id="eva-ui">0</span>%</div>
            <div class="stat-box">초콜릿: <span id="potion-ui">3</span>개</div>
            <div class="stat-box" style="width: 100%; color: #b2ebf2; font-size: 0.85rem; margin-top: 2px;" id="buff-ui">적용 효과 없음</div>
        </div>

        <div id="main-screen">
            <div id="action-area">
                <div id="left-panel">
                    <div id="monster-area">
                        <h2 id="monster-name">도파민 요괴</h2>
                        <div id="monster-image">👻</div>
                        <h3 class="hp-text" style="margin:0;">요괴의 기운: <span id="monster-hp">50/50</span></h3>
                    </div>
                </div>

                <div id="right-panel">
                    <div id="quiz-box"></div>

                    <div id="hub-ui" class="grid-ui">
                        <button class="lobby-btn full-width" onclick="startBattle()">🚪 다음 층 테스트 (전투)</button>
                        <button class="lobby-btn" style="background-color: #2e7d32;" onclick="openShop()">🛒 상점 방문</button>
                        <button class="bag-btn" onclick="openInventory()">🎒 내 가방</button>
                        <button class="system-btn" onclick="saveGame()">💾 저장하기</button>
                        <button class="quit-btn" onclick="confirmReturnToTitle()">🏠 나가기</button>
                    </div>

                    <div id="shop-ui" class="grid-ui">
                        <button class="shop-btn" onclick="buyItem('potion')">
                            🍫 당충전 초콜릿 (30G)
                            <span>지식 40 즉시 회복</span>
                        </button>
                        <button class="shop-btn" onclick="buyItem('shield')">
                            📘 철벽 백과사전 (50G)
                            <span>요괴 방해 1회 무효화</span>
                        </button>
                        <button class="shop-btn" onclick="buyItem('powerUp')">
                            💡 마법의 형광펜 (50G)
                            <span>2회 정답의 힘 상승</span>
                        </button>
                        <button class="shop-btn" onclick="buyItem('maxhp')">
                            📚 전공서적 (100G)
                            <span>최대 지식 +20 증가</span>
                        </button>
                        <button class="back-btn full-width" style="margin-top:0;" onclick="closeShop()">⬅️ 상점 닫기</button>
                    </div>

                    <div id="battle-ui" class="grid-ui">
                        <button class="quiz-btn full-width" onclick="loadQuiz()">📝 개념 일깨우기 (정화)</button>
                        <button class="potion-btn" onclick="usePotion()">🍫 초콜릿 먹기</button>
                        <button class="bag-btn" onclick="openInventory()">🎒 내 가방 열기</button>
                    </div>

                    <div id="options-ui" class="grid-ui" style="grid-template-columns: 1fr;"></div>
                </div>
            </div>
        </div>

        <div id="log-box"></div>
        
        <div id="tutorial-overlay" class="pos-bottom">
            <div id="tutorial-text">튜토리얼 텍스트</div>
            <div class="tut-btn-wrap">
                <button class="tut-btn tut-exit" onclick="exitTutorial()">중단하고 나가기</button>
                <button class="tut-btn tut-next" id="tutorial-next-btn" onclick="nextTutorialStep()">다음 ➡️</button>
            </div>
        </div>
    </div>

    <div id="inventory-modal">
        <h2 style="margin-top: 0; color: #fff;">🎒 가방 내용물</h2>
        <div id="inventory-list"></div>
        <button class="back-btn" onclick="closeInventory()" style="flex: none; margin-top:10px;">닫기</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. 기본 변수 및 몬스터/아이템 데이터 설정
    // ==========================================
    let quizBank = [];
    let studyBank = [];
    let categoryList = [];
    let activeQuizBank = [];
    
    let player = {};
    let monster = null;
    let activeEffects = { shield: 0, powerUp: 0, weaken: 0, armorBreak: 0 };
    
    let isTutorialMode = false;
    
    let savedHighScore = localStorage.getItem('historyTowerMaxFloor') || 1;
    document.getElementById('high-score-ui').innerText = savedHighScore;

    function parseAllData() {
        if (typeof rawQuizData !== 'undefined') {
            const lines = rawQuizData.split('\n'); let cat = "기타";
            lines.forEach(l => {
                let ln = l.trim(); if (!ln) return;
                if (ln.startsWith('[') && ln.endsWith(']')) { 
                    cat = ln.slice(1, -1); 
                    if (!categoryList.includes(cat)) categoryList.push(cat); 
                } else { 
                    let p = ln.split('|').map(x => x.trim()); 
                    if (p.length >= 5) {
                        quizBank.push({ category: cat, q: p[0], options: [p[1], p[2], p[3]], answer: parseInt(p[4]) - 1 }); 
                    }
                }
            });
            
            document.getElementById('data-status').innerText = "✅ 시스템 준비 완료";
            
            const s = document.getElementById('start-category');
            const e = document.getElementById('end-category');
            categoryList.forEach((c, i) => { s.options.add(new Option(c, i)); e.options.add(new Option(c, i)); });
            if (categoryList.length > 0) e.value = categoryList.length - 1;
        }

        if (typeof rawStudyData !== 'undefined') {
            const lines = rawStudyData.split('\n'); let cat = "기타";
            lines.forEach(l => {
                let ln = l.trim(); if (!ln) return;
                if (ln.startsWith('[') && ln.endsWith(']')) cat = ln.slice(1, -1);
                else { let p = ln.split('|').map(x => x.trim()); if (p.length >= 2) studyBank.push({ category: cat, keyword: p[0], desc: p[1] }); }
            });
        }
    }

    function loadQuiz() {
        if (activeQuizBank.length === 0) {
            addLog("출제할 문제가 없습니다. 로비로 돌아갑니다.", "#ffb74d");

        }

        document.getElementById('battle-ui').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('options-ui').style.display = 'grid';

        let rIdx = Math.floor(Math.random() * activeQuizBank.length);
        let currentQuiz = activeQuizBank[rIdx];
        
        document.getElementById('quiz-box').innerText = currentQuiz.q;
        
        const optContainer = document.getElementById('options-ui');
        optContainer.innerHTML = "";
        
        currentQuiz.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx === currentQuiz.answer, currentQuiz.options[currentQuiz.answer]);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(isCorrect, correctAnswer) {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('options-ui').style.display = 'none';

        if (isCorrect) {
            let damage = 15 + player.baseAtk;
            if (activeEffects.powerUp > 0) { damage = Math.floor(damage * 1.5); activeEffects.powerUp--; }
            if (activeEffects.armorBreak > 0) { damage = Math.floor(damage * 1.5); activeEffects.armorBreak--; }
            
            monster.hp -= damage;
            addLog(`⭕ 정답! [${monster.name}]의 기운을 ${damage}만큼 약화시켰습니다.`, "#00e676");
            
            if (monster.hp <= 0) {
                winBattle();
                return; 
            }
        } else {
            addLog(`❌ 오답입니다! (정답: <b style="color:#ffeb3b;">${correctAnswer}</b>)`, "#ff7043");
            addLog(`정답의 기운을 전달하지 못했습니다.`, "#ffb74d");
        }

        if (Math.random() * 100 < player.evasion) {
            addLog("💨 뛰어난 집중력으로 요괴의 혼란을 튕겨냈습니다!", "#81c784");
        } else if (activeEffects.shield > 0) {
            addLog("📘 철벽 백과사전이 요괴의 방해를 막아냈습니다!", "#4dd0e1");
            activeEffects.shield--;
        } else {
            let takenDamage = monster.atk;
            if (activeEffects.weaken > 0) { takenDamage = Math.floor(takenDamage / 2); activeEffects.weaken--; }
            
            player.hp -= takenDamage;
            addLog(`💥 [${monster.name}]의 딴짓 유도! 지식을 ${takenDamage}만큼 잃었습니다.`, "#ff5252");
            
            if (player.hp <= 0) {
                checkDeath();
                return;
            }
        }
        
        document.getElementById('monster-hp').innerText = `${Math.max(0, monster.hp)}/${monster.maxHp}`;
        updateUI();
        document.getElementById('battle-ui').style.display = 'grid';
    }

    function winBattle() {
        document.getElementById('monster-hp').innerText = `0/${monster.maxHp}`;
        addLog(`🎉 [${monster.name}]을(를) 완벽히 정화했습니다!`, "#ffd700");
        
        let earnedGold = 10 + Math.floor(Math.random() * 10) + player.floor;
        player.gold += earnedGold;
        addLog(`${earnedGold}G를 획득했습니다.`, "#ffd700");
        
        player.floor++;
        if (player.floor > savedHighScore) {
            savedHighScore = player.floor;
            localStorage.setItem('historyTowerMaxFloor', savedHighScore);
            document.getElementById('high-score-ui').innerText = savedHighScore;
        }
        
        setTimeout(showRewardScreen, 1000);
    }

    function checkDeath() {
        updateUI();
        if (player.inventory['revive'] > 0) {
            player.inventory['revive']--;
            player.hp = Math.floor(player.maxHp / 2);
            addLog("🧽 마법의 지우개로 실수를 지우고 지식을 절반 회복하여 일어납니다!", "#ffd700");
            updateUI();
            document.getElementById('battle-ui').style.display = 'grid';
        } else {
            addLog("💀 지식이 고갈되어 쓰러졌습니다... 다시 공부해야 합니다.", "#c62828");
            alert(`도전 종료!\n도달한 층수: ${player.floor}층`);
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('title-screen').style.display = 'flex';
        }
    }

    // ==========================================
    // 6. 보상 및 매점(상점), 가방 시스템
    // ==========================================
    function showRewardScreen() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('hub-ui').style.display = 'none';
        document.getElementById('battle-ui').style.display = 'none';
        document.getElementById('reward-screen').style.display = 'flex';
        
        const container = document.getElementById('reward-cards-container');
        container.innerHTML = "";
        
        let shuffled = REWARD_CARDS.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        shuffled.forEach(reward => {
            let card = document.createElement('div');
            card.className = "reward-card";
            card.innerHTML = `
                <div class="reward-icon">${reward.icon}</div>
                <div class="reward-text-wrap">
                    <div class="reward-title">${reward.title}</div>
                    <div class="reward-desc">${reward.desc}</div>
                </div>
            `;
            card.onclick = () => {
                let result = reward.action();
                document.getElementById('reward-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                if (result !== 'boss') { enterHub(); }
            };
            container.appendChild(card);
        });
    }

    function openShop() {
        document.getElementById('hub-ui').style.display = 'none';
        document.getElementById('shop-ui').style.display = 'grid';
        addLog("매점에 입장했습니다. 무엇을 살까요?", "#b2ebf2");
    }

    function closeShop() {
        document.getElementById('shop-ui').style.display = 'none';
        document.getElementById('hub-ui').style.display = 'grid';
    }

    function buyItem(type) {
        const prices = { potion: 30, shield: 50, powerUp: 50, maxhp: 100 };
        if (player.gold >= prices[type]) {
            player.gold -= prices[type];
            if (type === 'potion') { player.potions++; }
            else if (type === 'maxhp') { player.maxHp += 20; player.hp += 20; }
            else { player.inventory[type] = (player.inventory[type] || 0) + 1; }
            
            addLog(`학용품을 구매했습니다!`, "#a5d6a7");
            updateUI();
        } else {
            addLog(`장학금이 부족합니다.`, "#ff5252");
        }
    }

    function usePotion() {
        if (player.potions > 0) {
            if (player.hp >= player.maxHp) { addLog("이미 지식이 가득 차 있습니다.", "#fff"); return; }
            player.potions--;
            player.hp = Math.min(player.maxHp, player.hp + 40);
            addLog("🍫 달콤한 초콜릿을 먹고 집중력(지식)을 40 회복했습니다.", "#a5d6a7");
            updateUI();
        } else {
            addLog("초콜릿이 없습니다!", "#ff5252");
        }
    }

    function openInventory() {
        document.getElementById('inventory-modal').style.display = 'flex';
        const list = document.getElementById('inventory-list');
        list.innerHTML = "";
        
        let hasItem = false;
        for (let key in player.inventory) {
            if (player.inventory[key] > 0) {
                hasItem = true;
                let item = ITEM_DB[key];
                let div = document.createElement('div');
                div.className = "inv-item";
                div.innerHTML = `
                    <div class="inv-item-info">
                        <div class="inv-item-title">${item.name} x${player.inventory[key]}</div>
                        <div class="inv-item-desc">${item.desc}</div>
                    </div>
                    <button class="use-btn" onclick="useInventoryItem('${key}')">사용</button>
                `;
                list.appendChild(div);
            }
        }
        if (!hasItem) { list.innerHTML = "<div style='color:#bdc3c7; text-align:center; margin-top:20px;'>가방이 비어 있습니다. 필통을 채워보세요!</div>"; }
    }

    function closeInventory() { document.getElementById('inventory-modal').style.display = 'none'; }

    function useInventoryItem(key) {
        if (player.inventory[key] > 0) {
            player.inventory[key]--;
            if (key === 'shield') activeEffects.shield++;
            else if (key === 'powerUp') activeEffects.powerUp += 2;
            else if (key === 'weaken') activeEffects.weaken += 2;
            else if (key === 'armorBreak') activeEffects.armorBreak += 2;
            
            addLog(`🎒 가방에서 ${ITEM_DB[key].name}을(를) 꺼내 사용했습니다!`, "#e65100");
            updateUI();
            openInventory(); 
        }
    }

    // ==========================================
    // 7. 지식 노트 (공부하기), 저장 및 기타 기능
    // ==========================================
    function openStudyScreen() { 
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('study-screen').style.display = 'flex'; 
        renderStudyData();
    }
    
    function closeStudyScreen() { 
        document.getElementById('study-screen').style.display = 'none'; 
        document.getElementById('title-screen').style.display = 'flex';
    }

    function renderStudyData() {
        const content = document.getElementById('study-content');
        if (studyBank.length === 0) {
            content.innerHTML = "<p style='text-align:center; margin-top: 20px;'>study_data.js에 등록된 학습 데이터가 없습니다.</p>";
            return;
        }
        content.innerHTML = "";
        
        let categories = [...new Set(studyBank.map(item => item.category))];
        categories.forEach(cat => {
            let header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = cat + " ▼";
            
            let list = document.createElement('div');
            list.className = 'category-content';
            
            studyBank.filter(item => item.category === cat).forEach(item => {
                let studyItem = document.createElement('div');
                studyItem.className = 'study-item';
                studyItem.innerHTML = `
                    <div class="study-keyword">${item.keyword} <span>+</span></div>
                    <div class="study-desc">${item.desc}</div>
                `;
                studyItem.querySelector('.study-keyword').onclick = function() {
                    let desc = this.nextElementSibling;
                    let span = this.querySelector('span');
                    if(desc.style.display === 'block') { desc.style.display = 'none'; span.innerText = '+'; } 
                    else { desc.style.display = 'block'; span.innerText = '-'; }
                };
                list.appendChild(studyItem);
            });
            
            header.onclick = function() {
                if(list.style.display === 'block') { list.style.display = 'none'; this.innerText = cat + " ▼"; } 
                else { list.style.display = 'block'; this.innerText = cat + " ▲"; }
            };
            
            content.appendChild(header);
            content.appendChild(list);
        });
    }

    function saveGame() {
        let saveData = { player: player, effects: activeEffects };
        localStorage.setItem('historyTowerSave', JSON.stringify(saveData));
        addLog("💾 공부 진행 상황이 저장되었습니다.", "#4dd0e1");
    }

    function loadGameFromTitle() {
        let saved = localStorage.getItem('historyTowerSave');
        if (saved) {
            try {
                let data = JSON.parse(saved);
                
                player = Object.assign({ hp: 100, maxHp: 100, gold: 0, potions: 3, floor: 1, inventory: {}, baseAtk: 0, evasion: 0 }, data.player);
                activeEffects = data.effects || { shield: 0, powerUp: 0, weaken: 0, armorBreak: 0 };
                activeQuizBank = quizBank;
                
                document.getElementById('title-screen').style.display = 'none';
                document.getElementById('reward-screen').style.display = 'none';
                document.getElementById('study-screen').style.display = 'none';
                document.getElementById('range-screen').style.display = 'none';
                document.getElementById('tutorial-overlay').style.display = 'none';
                
                document.getElementById('game-container').style.display = 'flex';
                document.getElementById('main-screen').style.display = 'flex'; 
                document.getElementById('global-help').style.display = 'flex';
                
                addLog("💾 저장된 공부를 이어서 시작합니다.", "#4dd0e1");
                enterHub();
            } catch (e) {
                alert("저장된 데이터를 불러오는 중 오류가 발생했습니다. 새 도전을 시작해 주세요.");
            }
        } else {
            alert("저장된 데이터가 없습니다.");
        }
    }

    function confirmReturnToTitle() {
        if (confirm("진행 상황이 초기화됩니다. 정말 나가시겠습니까?\n(저장하기를 누르셨다면 이어하기가 가능합니다)")) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('title-screen').style.display = 'flex';
            document.getElementById('global-help').style.display = 'none';
        }
    }

    window.onload = () => { parseAllData(); };

</script>
</body>
