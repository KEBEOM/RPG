<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>역사 타워 RPG</title>
<style>
    :root {
        --safe-left: env(safe-area-inset-left);
        --safe-right: env(safe-area-inset-right);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-top: env(safe-area-inset-top);
    }

    body {
        margin: 0; padding: 0; background-color: #1a1a1a; color: #fff;
        font-family: 'NeoDunggeunmo', 'Malgun Gothic', sans-serif;
        display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
        box-sizing: border-box;
    }

    /* --- 타이틀 화면 --- */
    #title-screen {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #111; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 100;
    }
    .game-title { 
        font-size: 3.5rem; color: #ffd700; text-align: center; 
        margin-bottom: 50px; text-shadow: 2px 2px 0px #d32f2f; 
    }
    
    /* 타이틀 버튼 가로 정렬을 위한 그룹 */
    .title-btn-group {
        display: flex;
        gap: 20px; /* 버튼 사이 간격 */
        justify-content: center;
    }

    .title-btn { 
        background-color: #e65100; color: white; border: none; 
        padding: 15px 40px; font-size: 1.4rem; border-radius: 10px; 
        cursor: pointer; min-width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
        transition: transform 0.1s;
    }
    .title-btn.load-btn { background-color: #00838f; }
    .title-btn:active { transform: scale(0.95); }

    /* --- 게임 UI --- */
    #game-container { display: none; flex-direction: column; height: 100%; width: 100%; }
    #status-bar { display: flex; justify-content: space-between; background-color: #333; padding: 10px 20px; font-size: 1.2rem; border-bottom: 2px solid #555; }
    .stat-box span { color: #ffd700; font-weight: bold; }
    .hp-text { color: #ff6b6b; }

    #main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

    /* 몬스터 및 퀴즈 영역 */
    #monster-area { display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
    #monster-image { width: 120px; height: 120px; background-color: #555; border: 3px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 10px; }
    #quiz-box { display: none; background-color: #2c3e50; padding: 15px; border-radius: 10px; border: 2px solid #f39c12; margin-bottom: 20px; width: 90%; max-width: 500px; font-size: 1.2rem; line-height: 1.4; }

    /* 버튼 그룹 */
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 600px; }
    button { color: white; border: none; padding: 15px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; flex: 1 1 40%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    button:active { transform: scale(0.95); }

    /* 로비 & 상점 버튼 */
    .lobby-btn { background-color: #7b1fa2; font-size: 1.2rem; padding: 15px; }
    .study-btn { background-color: #0277bd; flex: 1 1 100%; }
    .shop-btn { background-color: #00838f; }
    .back-btn { background-color: #616161; }
    .system-btn { background-color: #455a64; flex: 1 1 100%; margin-top: 10px; }

    /* 전투 버튼 */
    .quiz-btn { background-color: #d32f2f; font-size: 1.3rem; padding: 20px; flex: 1 1 100%; }
    .option-btn { background-color: #34495e; font-size: 1.1rem; flex: 1 1 100%; }
    .potion-btn { background-color: #fbc02d; color: #333; }

    #log-box { height: 25%; background-color: #000; border-top: 2px solid #555; padding: 10px; overflow-y: auto; font-size: 1.1rem; line-height: 1.4; }
    #log-box p { margin: 5px 0; }
</style>
</head>
<body>

    <div id="title-screen">
        <h1 class="game-title">올라라!<br>역사 타워</h1>
        
        <div class="title-btn-group">
            <button class="title-btn" onclick="startGame(true)">새로운 도전</button>
            <button class="title-btn load-btn" onclick="loadGameFromTitle()">이어하기</button>
        </div>
    </div>

    <div id="game-container">
        <div id="status-bar">
            <div class="stat-box">층수: <span id="floor-ui">1F</span></div>
            <div class="stat-box hp-text">HP: <span id="hp-ui">100/100</span></div>
            <div class="stat-box">Gold: <span id="gold-ui">0</span>G</div>
            <div class="stat-box">포션: <span id="potion-ui">3</span>개</div>
        </div>

        <div id="main-screen">
            <div id="monster-area">
                <h2 id="monster-name">망각의 요괴</h2>
                <div id="monster-image">👻</div>
                <h3 class="hp-text">HP: <span id="monster-hp">50/50</span></h3>
            </div>

            <div id="quiz-box"></div>

            <div id="hub-ui" class="button-group">
                <button class="study-btn" onclick="showStudyNote()">📖 오늘의 학습 노트 보기</button>
                <button class="lobby-btn" onclick="startBattle()">⚔️ 실전 테스트 (다음 층)</button>
                <button class="lobby-btn" style="background-color: #2e7d32;" onclick="openShop()">🛒 상점 (정비)</button>
                <button class="system-btn" onclick="saveGame()">💾 진행 상황 저장하기</button>
            </div>

            <div id="shop-ui" class="button-group" style="display: none;">
                <button class="shop-btn" onclick="buyItem('potion')">🧪 포션 구매 (30G)</button>
                <button class="shop-btn" onclick="buyItem('maxhp')">❤️ 최대체력 +20 (100G)</button>
                <button class="shop-btn back-btn" onclick="closeShop()">⬅️ 로비로 돌아가기</button>
            </div>

            <div id="battle-ui" class="button-group" style="display: none;">
                <button class="quiz-btn" onclick="loadQuiz()">📝 개념 공격 (문제 풀기)</button>
                <button class="potion-btn" onclick="usePotion()">🧪 체력 회복 (포션)</button>
            </div>

            <div id="options-ui" class="button-group" style="display: none;"></div>
        </div>

        <div id="log-box"></div>
    </div>

<script>
    const studyContent = "📝 [핵심 요약]\n1. 1592년: 임진왜란 발발\n2. 한산도 대첩: 학익진 전술로 이순신 장군 승리\n3. 행주 대첩: 권율 장군과 백성들의 방어\n4. 명량 해전: 12척의 배로 대승";

    const quizBank = [
        { q: "임진왜란이 발발한 연도는 언제인가?", options: ["1492년", "1592년", "1636년"], answer: 1 },
        { q: "이순신 장군이 '학익진' 전술을 사용하여 크게 승리한 해전은?", options: ["명량해전", "한산도대첩", "노량해전"], answer: 1 },
        { q: "행주산성에서 권율 장군과 부녀자들이 힘을 합쳐 왜군을 물리친 전투는?", options: ["진주대첩", "행주대첩", "살수대첩"], answer: 1 },
        { q: "단 12척의 배로 133척의 왜군을 물리친 기적적인 해전은?", options: ["명량해전", "부산포해전", "옥포해전"], answer: 0 }
    ];

    let currentQuiz = null;
    let player = {};
    let monster = null;
    let gameState = 'title';

    function getNewPlayerStat() {
        return { hp: 100, maxHp: 100, gold: 50, potions: 3, floor: 1 };
    }

    function startGame(isNew) {
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        
        if(isNew) {
            player = getNewPlayerStat();
            document.getElementById('log-box').innerHTML = "";
            addLog("역사 타워에 입장했습니다. 잃어버린 기억을 되찾으세요!", "#ffd700");
            updateUI();
            enterHub();
        }
    }

    function loadGameFromTitle() {
        let saved = localStorage.getItem('historyTowerSave');
        if (saved) {
            player = JSON.parse(saved);
            startGame(false);
            addLog("저장된 위치부터 이어서 시작합니다.", "#4db6ac");
            updateUI();
            enterHub();
        } else {
            alert("저장된 데이터가 없습니다! 새로운 도전을 시작해 주세요.");
        }
    }

    function saveGame() {
        localStorage.setItem('historyTowerSave', JSON.stringify(player));
        addLog("현재 층수와 스탯이 안전하게 저장되었습니다.", "#4db6ac");
    }

    function updateUI() {
        document.getElementById('floor-ui').innerText = player.floor + "F";
        document.getElementById('hp-ui').innerText = `${player.hp}/${player.maxHp}`;
        document.getElementById('gold-ui').innerText = player.gold;
        document.getElementById('potion-ui').innerText = player.potions;
        if (monster) document.getElementById('monster-hp').innerText = `${monster.hp}/${monster.maxHp}`;
    }

    function addLog(msg, color = "white") {
        const logBox = document.getElementById('log-box');
        logBox.innerHTML += `<p style="color: ${color};">${msg}</p>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function enterHub() {
        gameState = 'hub';
        document.getElementById('monster-area').style.display = 'none';
        document.getElementById('battle-ui').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('options-ui').style.display = 'none';
        document.getElementById('shop-ui').style.display = 'none';
        document.getElementById('hub-ui').style.display = 'flex';
        
        addLog(`--- [ ${player.floor}층 안전지대 ] 정비를 하거나 학습을 진행하세요. ---`, "#a5d6a7");
        updateUI();
    }

    function showStudyNote() {
        alert(studyContent);
        addLog("학습 노트를 복습했습니다. 지식이 조금 더 선명해졌습니다.", "#4dd0e1");
    }

    function openShop() {
        document.getElementById('hub-ui').style.display = 'none';
        document.getElementById('shop-ui').style.display = 'flex';
        addLog("상점에 입장했습니다. 모은 골드로 생존 물품을 구매하세요.", "#4dd0e1");
    }

    function closeShop() {
        document.getElementById('shop-ui').style.display = 'none';
        document.getElementById('hub-ui').style.display = 'flex';
        addLog("상점에서 나왔습니다.", "#fff");
    }

    function buyItem(itemType) {
        if (itemType === 'potion' && player.gold >= 30) {
            player.gold -= 30; player.potions++;
            addLog("포션을 1개 구매했습니다! (30G)", "#ffd700");
        } else if (itemType === 'maxhp' && player.gold >= 100) {
            player.gold -= 100; player.maxHp += 20; player.hp += 20;
            addLog("최대 체력을 확장했습니다! +20 (100G)", "#ff8a65");
        } else {
            addLog("골드가 부족합니다! 문제를 더 맞혀야 합니다.", "#ff5252");
        }
        updateUI();
    }

    function startBattle() {
        gameState = 'battle';
        document.getElementById('hub-ui').style.display = 'none';
        document.getElementById('battle-ui').style.display = 'flex';
        document.getElementById('monster-area').style.display = 'flex';

        let maxHp = 30 + (player.floor * 10);
        monster = { name: "망각의 요괴", hp: maxHp, maxHp: maxHp, goldReward: 20 + (player.floor * 5) };
        
        addLog(`야생의 ${monster.name}이(가) 나타나 개념을 훔쳐가려 합니다!`, "#ff9800");
        updateUI();
    }

    function loadQuiz() {
        let randIdx = Math.floor(Math.random() * quizBank.length);
        currentQuiz = quizBank[randIdx];

        document.getElementById('battle-ui').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('quiz-box').innerText = currentQuiz.q;
        
        const optionsUi = document.getElementById('options-ui');
        optionsUi.style.display = 'flex';
        optionsUi.innerHTML = ""; 

        currentQuiz.options.forEach((opt, index) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = `${index + 1}. ${opt}`;
            btn.onclick = () => checkAnswer(index);
            optionsUi.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex) {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('options-ui').style.display = 'none';
        document.getElementById('battle-ui').style.display = 'flex';

        if (selectedIndex === currentQuiz.answer) {
            let dmg = 25 + Math.floor(Math.random() * 10);
            monster.hp -= dmg;
            player.gold += 10;
            addLog(`⭕ 정답! ${monster.name}에게 ${dmg}의 피해를 입히고 10G를 얻었습니다!`, "#00e676");
        } else {
            let dmg = 15 + Math.floor(Math.random() * 5);
            player.hp -= dmg;
            addLog(`❌ 오답입니다... 개념이 흔들려 ${dmg}의 피해를 입었습니다! (정답: ${currentQuiz.options[currentQuiz.answer]})`, "#ff5252");
        }

        updateUI();

        if (monster.hp <= 0) {
            setTimeout(winBattle, 500);
        } else if (player.hp <= 0) {
            setTimeout(gameOver, 500);
        }
    }

    function usePotion() {
        if (player.potions > 0) {
            player.potions--;
            player.hp = Math.min(player.maxHp, player.hp + 40);
            addLog("포션을 사용하여 체력을 크게 회복했습니다.", "#fff176");
            updateUI();
        } else {
            addLog("포션이 없습니다! 상점에서 구매하세요.", "#ff9800");
        }
    }

    function winBattle() {
        addLog(`${monster.name}을(를) 물리쳤습니다! 층 클리어 보상으로 ${monster.goldReward}G를 획득했습니다.`, "#69f0ae");
        player.gold += monster.goldReward;
        monster = null; 
        player.floor++;
        updateUI();
        setTimeout(enterHub, 1500);
    }

    function gameOver() {
        addLog("기억을 모두 빼앗겼습니다...", "#d50000");
        alert(`타워 등반 실패!\n도달한 층수: ${player.floor}F\n확인을 누르면 타이틀로 돌아갑니다.`);
        localStorage.removeItem('historyTowerSave'); 
        location.reload(); 
    }

</script>
</body>
</html>
